<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار نظام الخصومات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #486b65;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #486b65;
        }

        button {
            background: #486b65;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            background: #3a5651;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .product-preview {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            position: relative;
        }

        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
            direction: ltr;
        }

        .price-display {
            margin: 15px 0;
            font-size: 1.3rem;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            margin-left: 10px;
        }

        .current-price {
            color: #486b65;
            font-weight: 900;
            font-size: 1.5rem;
        }

        .saved-amount {
            color: #27ae60;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .test-result {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }

        .test-result.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .test-result.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .test-result.warning {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
        }

        .log {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 15px;
        }

        .products-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .product-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin: 10px 0;
            background: #f8f9fa;
        }

        .product-item:hover {
            background: #e9ecef;
            border-color: #486b65;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🏷️ اختبار نظام الخصومات الشامل</h1>

        <div class="grid">
            <!-- Add Product with Discount -->
            <div class="card">
                <h2>➕ إضافة منتج بخصم</h2>
                <div class="form-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="product-name" placeholder="مثال: مقبض دولاب">
                </div>
                <div class="form-group">
                    <label>السعر بعد الخصم (ج.م)</label>
                    <input type="number" id="product-price" placeholder="800" value="800">
                </div>
                <div class="form-group">
                    <label>السعر قبل الخصم (ج.م)</label>
                    <input type="number" id="product-old-price" placeholder="1000" value="1000">
                </div>
                <button onclick="addTestProduct()">💾 حفظ المنتج</button>
                <div id="add-result"></div>
            </div>

            <!-- Live Preview -->
            <div class="card">
                <h2>👁️ معاينة مباشرة</h2>
                <div class="product-preview" id="preview">
                    <div class="discount-badge" id="preview-badge" style="display: none;">-20%</div>
                    <h3 id="preview-name">اسم المنتج</h3>
                    <div class="price-display">
                        <span class="old-price" id="preview-old-price" style="display: none;">ج.م 1000</span>
                        <span class="current-price" id="preview-price">ج.م 800</span>
                    </div>
                    <div class="saved-amount" id="preview-saved" style="display: none;">وفرت ج.م 200</div>
                </div>
                <button onclick="updatePreview()">🔄 تحديث المعاينة</button>
            </div>

            <!-- Test Results -->
            <div class="card">
                <h2>✅ نتائج الاختبار</h2>
                <div id="test-results"></div>
                <button onclick="runAllTests()">🧪 تشغيل جميع الاختبارات</button>
            </div>
        </div>

        <!-- Products with Discounts -->
        <div class="card">
            <h2>📦 المنتجات التي تحتوي على خصومات</h2>
            <button onclick="loadDiscountedProducts()">🔄 تحديث القائمة</button>
            <div id="discounted-products" class="products-list"></div>
        </div>

        <!-- Debug Log -->
        <div class="card">
            <h2>🐛 سجل التصحيح</h2>
            <button onclick="clearLog()">🗑️ مسح السجل</button>
            <div id="debug-log" class="log"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/hybrid-adapter_v2.js"></script>
    <script src="js/data_v2.js"></script>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('debug-log');
            const time = new Date().toLocaleTimeString('ar-EG');
            const color = type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : type === 'warning' ? '#ffc107' : '#00ff00';
            logDiv.innerHTML += `<div style="color: ${color}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('debug-log').innerHTML = '';
        }

        function updatePreview() {
            const name = document.getElementById('product-name').value || 'اسم المنتج';
            const price = parseFloat(document.getElementById('product-price').value) || 0;
            const oldPrice = parseFloat(document.getElementById('product-old-price').value) || 0;

            document.getElementById('preview-name').textContent = name;
            document.getElementById('preview-price').textContent = `ج.م ${price}`;

            if (oldPrice && oldPrice > price) {
                const discount = Math.round(((oldPrice - price) / oldPrice) * 100);
                const saved = oldPrice - price;

                document.getElementById('preview-badge').style.display = 'block';
                document.getElementById('preview-badge').textContent = `-${discount}%`;

                document.getElementById('preview-old-price').style.display = 'inline';
                document.getElementById('preview-old-price').textContent = `ج.م ${oldPrice}`;

                document.getElementById('preview-saved').style.display = 'block';
                document.getElementById('preview-saved').textContent = `وفرت ج.م ${saved}`;

                log(`✅ معاينة الخصم: ${discount}% (وفرت ${saved} ج.م)`, 'success');
            } else {
                document.getElementById('preview-badge').style.display = 'none';
                document.getElementById('preview-old-price').style.display = 'none';
                document.getElementById('preview-saved').style.display = 'none';
                log('⚠️ لا يوجد خصم (السعر القديم يجب أن يكون أكبر)', 'warning');
            }
        }

        async function addTestProduct() {
            const resultDiv = document.getElementById('add-result');
            resultDiv.innerHTML = '<div style="text-align: center; padding: 10px;">⏳ جاري الحفظ...</div>';

            const name = document.getElementById('product-name').value || `منتج تجريبي ${Date.now()}`;
            const price = parseFloat(document.getElementById('product-price').value);
            const oldPrice = parseFloat(document.getElementById('product-old-price').value);

            log(`🚀 بدء حفظ المنتج: ${name}`, 'info');
            log(`💰 السعر الحالي: ${price} ج.م`, 'info');
            log(`💰 السعر القديم: ${oldPrice} ج.م`, 'info');

            const product = {
                name: name,
                price: price,
                oldPrice: oldPrice && !isNaN(oldPrice) && oldPrice > price ? oldPrice : null,
                quantity: 10,
                category: 'ديكورات',
                color: [],
                size: [],
                collections: [],
                variants: [],
                images: ['https://via.placeholder.com/300'],
                image: 'https://via.placeholder.com/300',
                description: 'منتج تجريبي لاختبار الخصومات',
                archived: false
            };

            try {
                await db.saveProduct(product);

                const discount = product.oldPrice ? Math.round(((product.oldPrice - product.price) / product.oldPrice) * 100) : 0;

                resultDiv.innerHTML = `
                    <div class="test-result success">
                        ✅ تم الحفظ بنجاح!<br>
                        ID: ${product.id}<br>
                        ${product.oldPrice ? `خصم: ${discount}% (وفرت ${product.oldPrice - product.price} ج.م)` : 'بدون خصم'}
                    </div>
                `;

                log(`✅ تم حفظ المنتج بنجاح! ID: ${product.id}`, 'success');
                if (product.oldPrice) {
                    log(`🏷️ الخصم: ${discount}%`, 'success');
                }

                setTimeout(loadDiscountedProducts, 500);
            } catch (error) {
                resultDiv.innerHTML = `<div class="test-result error">❌ فشل الحفظ: ${error.message}</div>`;
                log(`❌ خطأ في الحفظ: ${error.message}`, 'error');
            }
        }

        function loadDiscountedProducts() {
            const container = document.getElementById('discounted-products');
            const products = db.getProducts();

            const discounted = products.filter(p => p.oldPrice && parseFloat(p.oldPrice) > parseFloat(p.price));

            log(`📦 تم العثور على ${discounted.length} منتج بخصم من أصل ${products.length}`, 'info');

            if (discounted.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">لا توجد منتجات بخصم حالياً</div>';
                return;
            }

            container.innerHTML = discounted.map(p => {
                const discount = Math.round(((parseFloat(p.oldPrice) - parseFloat(p.price)) / parseFloat(p.oldPrice)) * 100);
                const saved = parseFloat(p.oldPrice) - parseFloat(p.price);

                return `
                    <div class="product-item">
                        <strong>${p.name}</strong><br>
                        <span style="text-decoration: line-through; color: #999;">ج.م ${p.oldPrice}</span>
                        <span style="color: #486b65; font-weight: 900; font-size: 1.2rem; margin: 0 10px;">ج.م ${p.price}</span>
                        <span style="background: #ff4757; color: white; padding: 3px 8px; border-radius: 5px; font-weight: 800;">-${discount}%</span>
                        <br>
                        <small style="color: #27ae60;">💰 وفرت: ج.م ${saved.toFixed(2)}</small>
                    </div>
                `;
            }).join('');
        }

        async function runAllTests() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div style="text-align: center; padding: 10px;">🧪 جاري التشغيل...</div>';

            log('🧪 بدء الاختبارات الشاملة...', 'info');

            let results = [];

            // Test 1: Check oldPrice field exists
            const testProduct = { price: 100, oldPrice: 150 };
            if (testProduct.oldPrice) {
                results.push({ name: 'حقل oldPrice موجود', status: 'success' });
                log('✅ Test 1: حقل oldPrice موجود', 'success');
            } else {
                results.push({ name: 'حقل oldPrice موجود', status: 'error' });
                log('❌ Test 1: حقل oldPrice غير موجود', 'error');
            }

            // Test 2: Discount calculation
            const discount = Math.round(((150 - 100) / 150) * 100);
            if (discount === 33) {
                results.push({ name: 'حساب نسبة الخصم صحيح', status: 'success' });
                log(`✅ Test 2: حساب الخصم صحيح (${discount}%)`, 'success');
            } else {
                results.push({ name: 'حساب نسبة الخصم صحيح', status: 'error' });
                log(`❌ Test 2: حساب الخصم خاطئ (${discount}%)`, 'error');
            }

            // Test 3: Check if products can be saved
            try {
                const products = db.getProducts();
                results.push({ name: 'قراءة المنتجات من DB', status: 'success' });
                log(`✅ Test 3: تم قراءة ${products.length} منتج`, 'success');
            } catch (e) {
                results.push({ name: 'قراءة المنتجات من DB', status: 'error' });
                log(`❌ Test 3: فشل قراءة المنتجات: ${e.message}`, 'error');
            }

            // Test 4: Check Hybrid System
            if (typeof HYBRID_CONFIG !== 'undefined') {
                results.push({
                    name: `نظام Hybrid ${HYBRID_CONFIG.enabled ? 'مفعّل' : 'معطل'}`,
                    status: HYBRID_CONFIG.enabled ? 'success' : 'warning'
                });
                log(`${HYBRID_CONFIG.enabled ? '✅' : '⚠️'} Test 4: Hybrid ${HYBRID_CONFIG.enabled ? 'ON' : 'OFF'}`, HYBRID_CONFIG.enabled ? 'success' : 'warning');
            }

            // Display results
            resultsDiv.innerHTML = results.map(r => `
                <div class="test-result ${r.status}">
                    ${r.status === 'success' ? '✅' : r.status === 'error' ? '❌' : '⚠️'} ${r.name}
                </div>
            `).join('');

            log('🏁 اكتملت جميع الاختبارات', 'info');
        }

        // Auto-update preview on input
        document.getElementById('product-name')?.addEventListener('input', updatePreview);
        document.getElementById('product-price')?.addEventListener('input', updatePreview);
        document.getElementById('product-old-price')?.addEventListener('input', updatePreview);

        // Initialize
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('✅ نظام الاختبار جاهز', 'success');
                updatePreview();
                loadDiscountedProducts();
                runAllTests();
            }, 500);
        });
    </script>
</body>

</html>
